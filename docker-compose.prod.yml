services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    env_file: .env
    environment:
      APP_ENV: production
      DATA_ENGINE_MODE: internal
      FLASHSCORE_USE_DEMO: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
