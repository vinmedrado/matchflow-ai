name: MatchFlow CI
on:
  push:
  pull_request:
jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install backend deps
        run: pip install -r requirements.txt
      - name: Backend tests
        run: pytest backend/tests
      - name: Validate imports
        run: python -m compileall backend 03_features 06_ml 07_data_ops 08_test_lab 09_decision_engine
      - name: Install frontend deps
        working-directory: frontend
        run: npm install
      - name: Frontend build
        working-directory: frontend
        run: npm run build
      - name: Ensure clean artifact tree
        run: |
          test -z "$(find . -path './.git' -prune -o \( -name '__pycache__' -o -name '*.pyc' -o -name '.pytest_cache' \) -print | head -1)"
